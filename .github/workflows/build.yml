name: Build AI Face Cam LivePortrait

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install opencv-python numpy onnxruntime pyvirtualcam pyinstaller

      - name: Get ORT include path
        id: ortpath
        shell: pwsh
        run: |
          $ortInclude = python -c "import onnxruntime; import os; print(os.path.join(os.path.dirname(onnxruntime.__file__), 'capi', 'include'))"
          echo "ORT_INCLUDE=$ortInclude" >> $env:GITHUB_OUTPUT
          echo "ORT include: $ortInclude"
          dir $ortInclude

      - name: Compile GridSample3D custom op DLL
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cl /LD /O2 /I "${{ steps.ortpath.outputs.ORT_INCLUDE }}" grid_sample_3d_ort.c /Fe:grid_sample_3d_ort.dll /link /DEF:NUL
          dir grid_sample_3d_ort.dll

      - name: Build exe
        run: |
          pyinstaller --onefile --name AIFaceCamLive --console --collect-all onnxruntime --hidden-import pyvirtualcam --add-data "grid_sample_3d_ort.dll;." live_portrait_onnx.py

      - name: Verify exe exists
        run: |
          dir dist\
          echo "Build complete!"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.0.${{ github.run_number }}
          name: AI Face Cam LivePortrait v3.0 Build ${{ github.run_number }}
          body: |
            ## AI Face Cam LivePortrait - Standalone Windows App

            Real-time face animation using LivePortrait AI. No Python needed!

            ### First run:
            - Downloads AI models automatically (~600MB, one time only)
            - Needs internet for first run, works offline after that

            ### How to use:
            1. Download AIFaceCamLive.exe below
            2. Double-click to run
            3. Choose G (generate AI face) or L (load your photo)
            4. Look at your webcam - the AI face follows your movements!

            ### Controls:
            - G = Generate new random AI face
            - L = Load a face photo
            - R = Reset pose tracking
            - ESC = Quit

            ### Virtual Webcam (for KYC):
            Install OBS Studio for virtual camera output.
            The animated face appears as a webcam in any app.
          files: dist/AIFaceCamLive.exe
          make_latest: true
