name: Build AI Face Cam LivePortrait

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install opencv-python numpy "onnxruntime==1.26.0" pyvirtualcam pyinstaller

      - name: Download ORT SDK headers
        run: |
          curl -sL -o ort_sdk.zip "https://github.com/microsoft/onnxruntime/releases/download/v1.26.0/onnxruntime-win-x64-1.26.0.zip"
          python -c "import zipfile; z=zipfile.ZipFile('ort_sdk.zip'); [z.extract(f,'ort_sdk') for f in z.namelist() if '/include/' in f]"
          mkdir ort_include 2>nul
          copy ort_sdk\onnxruntime-win-x64-1.26.0\include\*.h ort_include\
          dir ort_include

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile GridSample3D custom op DLL
        shell: cmd
        run: |
          cl /LD /O2 /I ort_include grid_sample_3d_ort.c /Fe:grid_sample_3d_ort.dll
          dir grid_sample_3d_ort.dll

      - name: Get OpenCV data path
        id: cv2path
        run: |
          $cv2data = python -c "import cv2; print(cv2.data.haarcascades)"
          echo "CV2_DATA=$cv2data" >> $env:GITHUB_OUTPUT

      - name: Build exe
        run: |
          pyinstaller --onefile --name AIFaceCamLive --console --collect-all onnxruntime --hidden-import pyvirtualcam --add-data "grid_sample_3d_ort.dll;." --add-data "${{ steps.cv2path.outputs.CV2_DATA }};cv2/data" live_portrait_onnx.py

      - name: Verify exe exists
        run: |
          dir dist\
          echo "Build complete!"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.0.${{ github.run_number }}
          name: AI Face Cam LivePortrait v3.0 Build ${{ github.run_number }}
          body: |
            ## AI Face Cam LivePortrait - Standalone Windows App

            Real-time face animation using LivePortrait AI. No Python needed!

            ### First run:
            - Downloads AI models automatically (~600MB, one time only)
            - Needs internet for first run, works offline after that

            ### How to use:
            1. Download AIFaceCamLive.exe below
            2. Double-click to run
            3. Choose G (generate AI face) or L (load your photo)
            4. Look at your webcam - the AI face follows your movements!

            ### Controls:
            - G = Generate new random AI face
            - L = Load a face photo
            - R = Reset pose tracking
            - ESC = Quit

            ### Virtual Webcam (for KYC):
            Install OBS Studio for virtual camera output.
            The animated face appears as a webcam in any app.
          files: dist/AIFaceCamLive.exe
          make_latest: true
